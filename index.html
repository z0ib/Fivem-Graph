<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Free Community Packs — Packs Graphiques</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM%20Serif%20Display:ital,wght@0,400;0,700;1,400&family=DM%20Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
[data-theme="light"]{
  --bg:#ffffff;--bg2:#d1d1d1;--surface:#474747;
  --text:#474747;--text-sub:#d1d1d1;--accent:#89744d;
  --overlay:#ffffffDD;--border:rgba(0,0,0,0.09);
}
[data-theme="dark"]{
  --bg:#000000;--bg2:#161411;--surface:#1D1B17;
  --text:#F0EBE1;--text-sub:#7A7570;--accent:#C8A96E;
  --overlay:#000000E0;--border:rgba(255,255,255,0.07);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;transition:background .55s,color .55s;overflow-x:hidden;cursor:none}
canvas#bg-anim{position:fixed;inset:0;z-index:0;pointer-events:none}
.grain-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px 180px;animation:grainAnim .12s steps(1) infinite}
@keyframes grainAnim{0%{background-position:0 0}25%{background-position:-10% 15%}50%{background-position:20% -5%}75%{background-position:-5% 20%}100%{background-position:10% 5%}}
.bg-ripple{position:fixed;pointer-events:none;z-index:2;border-radius:50%;transform:translate(-50%,-50%) scale(0);border:1px solid rgba(255,255,255,.45);animation:bgRippleOut .85s cubic-bezier(.2,0,0,1) forwards}
@keyframes bgRippleOut{to{transform:translate(-50%,-50%) scale(1);opacity:0;width:70px;height:70px}}
.bg-trail{position:fixed;pointer-events:none;z-index:2;border-radius:50%;background:#fff;transform:translate(-50%,-50%);animation:bgTrailFade .5s forwards;mix-blend-mode:difference}
@keyframes bgTrailFade{to{opacity:0;transform:translate(-50%,-50%) scale(0)}}
.cursor{position:fixed;width:10px;height:10px;background:var(--text);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .35s cubic-bezier(.2,0,0,1),height .35s cubic-bezier(.2,0,0,1);mix-blend-mode:difference}
.cursor.hover{width:44px;height:44px}
.cursor-ring{position:fixed;width:38px;height:38px;border:1px solid var(--text);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.4;mix-blend-mode:difference}
header{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:26px 52px;background:var(--overlay);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:background .55s,border-color .55s}
.logo{font-family:'DM Serif Display',serif;font-size:1.2rem;font-weight:700;letter-spacing:-.02em;color:var(--text);text-decoration:none;cursor:none}
.logo em{font-style:italic;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:28px}
.pack-count{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-sub);transition:color .55s}
.theme-toggle{width:50px;height:27px;background:var(--surface);border:1px solid var(--border);border-radius:99px;position:relative;cursor:none;transition:background .55s,border-color .55s;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:var(--accent);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
[data-theme="dark"] .theme-toggle::after{transform:translateX(23px)}
.theme-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-sub)}
#page-home{min-height:100vh;position:relative;z-index:3}
.hero{padding:164px 52px 72px;display:flex;align-items:flex-end;justify-content:space-between;gap:48px;animation:fadeUp .9s cubic-bezier(.2,0,0,1) both}
.hero-left h1{font-family:'DM Serif Display',serif;font-size:clamp(2.8rem,7vw,8rem);font-weight:400;line-height:1;letter-spacing:-.035em}
.hero-left h1 em{font-style:italic;color:var(--accent)}
.hero-right{max-width:300px;text-align:right;animation:fadeUp .9s .1s cubic-bezier(.2,0,0,1) both}
.hero-right p{font-size:.82rem;line-height:1.75;color:var(--text-sub);letter-spacing:.02em}
.divider{height:1px;background:var(--border);margin:52px 52px 44px;transition:background .55s}
.grid-label{display:flex;align-items:center;justify-content:space-between;padding:0 52px;margin-bottom:24px}
.grid-label span{font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-sub)}
.packs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px;padding:0 52px 120px}
.pack-card{display:block;text-decoration:none;position:relative;overflow:hidden;cursor:none;background:var(--surface);transition:background .55s;animation:fadeUp .7s cubic-bezier(.2,0,0,1) both}
.pack-card:nth-child(1){animation-delay:.08s}.pack-card:nth-child(2){animation-delay:.16s}.pack-card:nth-child(3){animation-delay:.24s}.pack-card:nth-child(4){animation-delay:.32s}.pack-card:nth-child(5){animation-delay:.4s}.pack-card:nth-child(6){animation-delay:.48s}
.pack-thumb{width:100%;aspect-ratio:4/3;overflow:hidden;position:relative}
.pack-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .75s cubic-bezier(.2,0,0,1)}
.pack-card:hover .pack-thumb img{transform:scale(1.06)}
.thumb-placeholder{width:100%;height:100%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-style:italic;font-size:.75rem;color:var(--text-sub);letter-spacing:.1em}
.card-overlay{position:absolute;inset:0;background:var(--overlay);opacity:0;transition:opacity .4s ease;display:flex;align-items:center;justify-content:center}
.pack-card:hover .card-overlay{opacity:1}
.view-label{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text);border:1px solid var(--text);padding:10px 22px;transform:translateY(10px);transition:transform .4s cubic-bezier(.2,0,0,1)}
.pack-card:hover .view-label{transform:translateY(0)}
.pack-meta{padding:18px 22px 22px;background:var(--bg);transition:background .55s}
.pack-meta-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.pack-name{font-family:'DM Serif Display',serif;font-size:1rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.pack-cat{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.pack-desc-short{font-size:.76rem;color:var(--text-sub);line-height:1.55}
#page-detail{display:none;min-height:100vh;opacity:0;transform:translateY(24px);transition:opacity .5s ease,transform .5s cubic-bezier(.2,0,0,1);position:relative;z-index:3}
#page-detail.visible{opacity:1;transform:translateY(0)}
.detail-inner{max-width:940px;margin:0 auto;padding:148px 52px 100px}
.back-btn{display:inline-flex;align-items:center;gap:12px;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-sub);cursor:none;border:none;background:none;margin-bottom:56px;transition:color .25s,gap .35s}
.back-btn:hover{color:var(--text);gap:20px}
.back-arrow{width:32px;height:1px;background:currentColor;position:relative;flex-shrink:0;transition:width .35s cubic-bezier(.2,0,0,1)}
.back-arrow::before{content:'';position:absolute;left:0;top:-3px;width:7px;height:7px;border-left:1px solid currentColor;border-bottom:1px solid currentColor;transform:rotate(45deg)}
.back-btn:hover .back-arrow{width:48px}
.detail-title{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3.8rem);font-weight:400;line-height:1.05;letter-spacing:-.03em;margin-bottom:10px}
.detail-title em{font-style:italic;color:var(--accent)}
.detail-cat{font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-sub);margin-bottom:48px;display:flex;align-items:center;gap:16px}
.detail-cat::after{content:'';width:180px;height:1px;background:var(--border)}
.video-wrap{width:100%;aspect-ratio:16/9;border-radius:3px;overflow:hidden;background:var(--surface);margin-bottom:40px}
.video-wrap iframe{width:100%;height:100%;border:none;display:block}
.video-placeholder-msg{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-sub);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}
.video-placeholder-msg svg{width:36px;height:36px;opacity:.25}
.detail-desc{font-size:.88rem;line-height:1.85;color:var(--text-sub);max-width:540px;margin-bottom:48px}
.dl-btn{display:inline-flex;align-items:center;gap:14px;background:var(--text);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;padding:16px 38px;border-radius:2px;cursor:none;transition:background .35s,color .35s,gap .35s,box-shadow .35s}
.dl-btn:hover{background:var(--accent);color:#fff;gap:22px;box-shadow:0 8px 36px rgba(200,169,110,.28)}
.dl-icon{width:14px;height:14px;flex-shrink:0}
#page-home{transition:opacity .38s ease,transform .38s ease}
#page-home.hidden{opacity:0;transform:translateY(-14px);pointer-events:none}
footer{border-top:1px solid var(--border);padding:30px 52px;display:flex;align-items:center;justify-content:space-between;transition:border-color .55s}
footer p{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-sub)}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){header{padding:18px 24px}.hero{padding:110px 24px 52px;flex-direction:column;gap:20px}.hero-right{text-align:left;max-width:100%}.divider{margin:40px 24px 32px}.grid-label{padding:0 24px}.packs-grid{padding:0 24px 80px;grid-template-columns:1fr 1fr;gap:1px}.detail-inner{padding:110px 24px 80px}footer{padding:24px;flex-direction:column;gap:8px;text-align:center}}
@media(max-width:480px){.packs-grid{grid-template-columns:1fr}.hero-left h1{font-size:2.4rem}}
</style>
</head>
<body>
<canvas id="bg-anim"></canvas>
<div class="grain-overlay"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<header>
  <a class="logo" href="#" onclick="goHome();return false;">Free Community Packs<em>.</em></a>
  <div class="header-right">
    <span class="pack-count" id="packCountLabel"></span>
    <span class="theme-label" id="themeLabel">Sombre</span>
    <div class="theme-toggle" id="themeToggle"></div>
  </div>
</header>
<div id="page-home">
  <section class="hero">
    <div class="hero-left"><h1>Graphics<br/><em>Packs</em></h1></div>
    <div class="hero-right"><p>Click on a pack to watch the presentation video and download the compressed file.</p></div>
  </section>
  <div class="divider"></div>
  <div class="grid-label"><span id="gridCount"></span><span>↓ Explorer</span></div>
  <div class="packs-grid" id="packsGrid"></div>
  <footer><p>© 2026 — Graphics Packs</p><p>By z0ib</p></footer>
</div>
<div id="page-detail">
  <div class="detail-inner">
    <button class="back-btn" onclick="goHome()"><span class="back-arrow"></span>Retour</button>
    <h2 class="detail-title" id="detail-title"></h2>
    <div class="detail-cat" id="detail-cat"></div>
    <div class="video-wrap" id="detail-video"></div>
    <p class="detail-desc" id="detail-desc"></p>
    <a class="dl-btn" id="detail-dl" href="#" target="_blank">
      <svg class="dl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/></svg>
      Télécharger le pack (.rar)
    </a>
  </div>
</div>
<script>
const packs = [
  {
    "id": "pack-1779045406604",
    "name": "Smooth FREE | by SOUSHI",
    "cat": "Graphics Pack",
    "desc": "Very good optimized smooth pack",
    "fullDesc": "Info :\nMods & Plugins",
    "image": "https://cdn.discordapp.com/attachments/1373620484515692607/1395918036577419345/PACK_FREE_SOUSHI.png?ex=6a1ad13a&is=6a197fba&hm=69bf5e92ea06bff5a8a9214552ac83aa3a0ba63827ae0845c7fe5372a15c6f05&",
    "video": "https://www.youtube.com/embed/vSNNYxTVVEo",
    "dl": "https://archive.org/download/pack-smooth-free-by-soushi/Pack%20smooth%20FREE%20by%20SOUSHI.rar"
  },
  {
    "id": "pack-1780096643526",
    "name": "Nouveau Pack",
    "cat": "Catégorie",
    "desc": "Description courte.",
    "fullDesc": "Description complète du pack.",
    "image": "",
    "video": "",
    "dl": "#"
  }
];
const grid = document.getElementById('packsGrid');
document.getElementById('gridCount').textContent = packs.length + ' pack' + (packs.length>1?'s':'') + ' disponible' + (packs.length>1?'s':'');
document.getElementById('packCountLabel').textContent = packs.length + ' Packs';
packs.forEach(p => {
  const thumb = p.image ? '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy"/>' : '<div class="thumb-placeholder">Aperçu à venir</div>';
  const card = document.createElement('a');
  card.className = 'pack-card'; card.href = '#';
  card.innerHTML = '<div class="pack-thumb">' + thumb + '<div class="card-overlay"><span class="view-label">Voir le pack</span></div></div><div class="pack-meta"><div class="pack-meta-top"><span class="pack-name">' + p.name + '</span><span class="pack-cat">' + p.cat + '</span></div><p class="pack-desc-short">' + p.desc + '</p></div>';
  card.addEventListener('click', e => { e.preventDefault(); openPack(p); });
  grid.appendChild(card);
});
function openPack(p) {
  const home = document.getElementById('page-home'), detail = document.getElementById('page-detail');
  const parts = p.name.split(' ');
  document.getElementById('detail-title').innerHTML = parts.length > 1 ? parts[0] + ' <em>' + parts.slice(1).join(' ') + '</em>' : '<em>' + p.name + '</em>';
  document.getElementById('detail-cat').textContent = p.cat;
  document.getElementById('detail-desc').textContent = p.fullDesc;
  document.getElementById('detail-dl').href = p.dl;
  const vw = document.getElementById('detail-video');
  vw.innerHTML = p.video ? '<iframe src="' + p.video + '" allowfullscreen allow="autoplay;encrypted-media"></iframe>' : '<div class="video-placeholder-msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg><span>Vidéo à venir</span></div>';
  home.classList.add('hidden');
  setTimeout(() => { home.style.display='none'; detail.style.display='block'; window.scrollTo(0,0); requestAnimationFrame(() => requestAnimationFrame(() => detail.classList.add('visible'))); }, 340);
}
function goHome() {
  const home = document.getElementById('page-home'), detail = document.getElementById('page-detail');
  detail.classList.remove('visible');
  setTimeout(() => { detail.style.display='none'; home.style.display=''; home.classList.remove('hidden'); window.scrollTo(0,0); }, 420);
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const h = document.documentElement; const d = h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme', d?'light':'dark');
  document.getElementById('themeLabel').textContent = d?'Clair':'Sombre';
});
const cursor = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0,pmx=0,pmy=0;
document.addEventListener('mousemove', e => { pmx=mx;pmy=my;mx=e.clientX;my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px';
  const spd=Math.abs(mx-pmx)+Math.abs(my-pmy);
  if(spd>8&&Math.random()>.55){const tr=document.createElement('div');tr.className='bg-trail';const s=Math.random()*.6+.3;tr.style.cssText='left:'+e.clientX+'px;top:'+e.clientY+'px;width:'+(s*3.5)+'px;height:'+(s*3.5)+'px;opacity:'+(0.12+Math.random()*.2)+';animation-duration:'+(0.35+Math.random()*.2)+'s';document.body.appendChild(tr);setTimeout(()=>tr.remove(),600);}
});
(function animateRing(){ rx+=(mx-rx)*.11; ry+=(my-ry)*.11; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(animateRing); })();
document.querySelectorAll('a,button,.theme-toggle,.pack-card').forEach(el => { el.addEventListener('mouseenter',()=>cursor.classList.add('hover')); el.addEventListener('mouseleave',()=>cursor.classList.remove('hover')); });
document.addEventListener('click',e=>{for(let i=0;i<3;i++){const r=document.createElement('div');r.className='bg-ripple';r.style.cssText='left:'+e.clientX+'px;top:'+e.clientY+'px;width:'+(16+i*20)+'px;height:'+(16+i*20)+'px;animation-delay:'+(i*.09)+'s;animation-duration:'+(0.6+i*.14)+'s';document.body.appendChild(r);setTimeout(()=>r.remove(),900);}});
(function bgCanvas(){
  const cv=document.getElementById('bg-anim');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  let W,H,mouse={x:0,y:0},t=0;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  const PTS=Array.from({length:50},()=>({x:Math.random()*1920,y:Math.random()*1080,vx:(Math.random()-.5)*.13,vy:(Math.random()-.5)*.13,r:Math.random()*.7+.15}));
  const GCOLS=22,GROWS=13;
  function loop(){
    t+=.01;
    ctx.fillStyle='#080808';ctx.fillRect(0,0,W,H);
    const mx=mouse.x||W/2,my=mouse.y||H/2;
    const g=ctx.createRadialGradient(mx,my,0,mx,my,Math.max(W,H)*.6);
    g.addColorStop(0,'rgba(255,255,255,0.025)');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const y1=(t*18)%H,y2=(t*18+H*.4)%H;
    [y1,y2].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.strokeStyle='rgba(255,255,255,0.016)';ctx.lineWidth=1;ctx.stroke();});
    const cw=W/GCOLS,ch=H/GROWS,RAD=230,FORCE=14;
    ctx.strokeStyle='rgba(255,255,255,0.042)';ctx.lineWidth=.6;
    for(let r=0;r<=GROWS;r++){ctx.beginPath();for(let c=0;c<=GCOLS;c++){const bx=c*cw,by=r*ch,dx=bx-mx,dy=by-my,d=Math.sqrt(dx*dx+dy*dy),wave=Math.sin(c*.38+t*.55+r*.32)*2.8,push=d<RAD?(1-d/RAD)*FORCE:0,px=bx+(d>0?dx/d*push:0),py=by+(d>0?dy/d*push:0)+wave;c===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.stroke();}
    for(let c=0;c<=GCOLS;c++){ctx.beginPath();for(let r=0;r<=GROWS;r++){const bx=c*cw,by=r*ch,dx=bx-mx,dy=by-my,d=Math.sqrt(dx*dx+dy*dy),wave=Math.sin(r*.38+t*.45+c*.28)*2.8,push=d<RAD?(1-d/RAD)*FORCE:0,px=bx+(d>0?dx/d*push:0)+wave,py=by+(d>0?dy/d*push:0);r===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.stroke();}
    PTS.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;const dx=mx-p.x,dy=my-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<190){p.vx+=dx/d*.005;p.vy+=dy/d*.005;}p.vx*=.997;p.vy*=.997;const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(spd>.42){p.vx=p.vx/spd*.42;p.vy=p.vy/spd*.42;}PTS.forEach(q=>{const dx2=p.x-q.x,dy2=p.y-q.y,d2=Math.sqrt(dx2*dx2+dy2*dy2);if(d2<105&&d2>0){ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,'+(1-d2/105)*.07+')';ctx.lineWidth=.5;ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();}});ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.35)';ctx.fill();});
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>

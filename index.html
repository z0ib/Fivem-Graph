<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Packs Graphiques</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ─── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

/* ─── THEME VARIABLES ─── */
[data-theme="light"] {
  --bg:        #F8F5EF;
  --bg2:       #F0EBE1;
  --surface:   #EDEAE3;
  --text:      #1A1814;
  --text-sub:  #6B6760;
  --border:    rgba(26,24,20,0.1);
  --accent:    #C8A96E;
  --accent2:   #8B5E3C;
  --overlay:   rgba(248,245,239,0.88);
  --card-shadow: 0 2px 24px rgba(26,24,20,0.07);
  --card-hover:  0 12px 48px rgba(26,24,20,0.14);
}
[data-theme="dark"] {
  --bg:        #0E0D0B;
  --bg2:       #161411;
  --surface:   #1D1B17;
  --text:      #F0EBE1;
  --text-sub:  #7A7570;
  --border:    rgba(240,235,225,0.08);
  --accent:    #C8A96E;
  --accent2:   #E8C98E;
  --overlay:   rgba(14,13,11,0.88);
  --card-shadow: 0 2px 24px rgba(0,0,0,0.4);
  --card-hover:  0 12px 48px rgba(0,0,0,0.7);
}

/* ─── BASE ─── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  transition: background 0.55s ease, color 0.55s ease;
  overflow-x: hidden;
  cursor: none;
}

/* ─── CUSTOM CURSOR ─── */
.cursor {
  position: fixed;
  width: 10px; height: 10px;
  background: var(--text);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width 0.35s cubic-bezier(0.2,0,0,1),
              height 0.35s cubic-bezier(0.2,0,0,1),
              background 0.3s;
  mix-blend-mode: difference;
}
.cursor.hover { width: 44px; height: 44px; }

.cursor-ring {
  position: fixed;
  width: 38px; height: 38px;
  border: 1px solid var(--text);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
  opacity: 0.4;
  mix-blend-mode: difference;
}

/* ─── HEADER ─── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 26px 52px;
  background: var(--overlay);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  transition: background 0.55s, border-color 0.55s;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  text-decoration: none;
  cursor: none;
  transition: color 0.3s;
}
.logo em { font-style: italic; color: var(--accent); }

.header-right { display: flex; align-items: center; gap: 28px; }

.pack-count {
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-sub);
  transition: color 0.55s;
}

/* Theme toggle pill */
.theme-toggle {
  width: 50px; height: 27px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  position: relative;
  cursor: none;
  transition: background 0.55s, border-color 0.55s;
  flex-shrink: 0;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 19px; height: 19px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="dark"] .theme-toggle::after { transform: translateX(23px); }
.theme-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-sub);
}

/* ─── HOME PAGE ─── */
#page-home { min-height: 100vh; }

/* HERO */
.hero {
  padding: 164px 52px 72px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 48px;
  animation: fadeUp 0.9s cubic-bezier(0.2,0,0,1) both;
}
.hero-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.8rem, 7vw, 6rem);
  font-weight: 400;
  line-height: 1.0;
  letter-spacing: -0.035em;
}
.hero-left h1 em { font-style: italic; color: var(--accent); }

.hero-right {
  max-width: 300px;
  text-align: right;
  animation: fadeUp 0.9s 0.1s cubic-bezier(0.2,0,0,1) both;
}
.hero-right p {
  font-size: 0.82rem;
  line-height: 1.75;
  color: var(--text-sub);
  letter-spacing: 0.02em;
}

/* Thin divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 52px 52px 44px;
  transition: background 0.55s;
}

/* Grid label */
.grid-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 52px;
  margin-bottom: 24px;
}
.grid-label span {
  font-size: 0.63rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-sub);
  transition: color 0.55s;
}

/* ─── PACKS GRID ─── */
.packs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2px;
  padding: 0 52px 120px;
}

/* ─── CARD ─── */
.pack-card {
  display: block;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  cursor: none;
  background: var(--surface);
  transition: background 0.55s;
  animation: fadeUp 0.7s cubic-bezier(0.2,0,0,1) both;
}
.pack-card:nth-child(1){ animation-delay:0.08s }
.pack-card:nth-child(2){ animation-delay:0.16s }
.pack-card:nth-child(3){ animation-delay:0.24s }
.pack-card:nth-child(4){ animation-delay:0.32s }
.pack-card:nth-child(5){ animation-delay:0.40s }
.pack-card:nth-child(6){ animation-delay:0.48s }
.pack-card:nth-child(7){ animation-delay:0.56s }
.pack-card:nth-child(8){ animation-delay:0.64s }

.pack-thumb {
  width: 100%;
  aspect-ratio: 4/3;
  overflow: hidden;
  position: relative;
}
.pack-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.75s cubic-bezier(0.2,0,0,1);
}
.pack-card:hover .pack-thumb img { transform: scale(1.06); }

.thumb-placeholder {
  width: 100%; height: 100%;
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.75rem;
  color: var(--text-sub);
  letter-spacing: 0.1em;
  transition: background 0.55s;
}

/* Hover overlay */
.card-overlay {
  position: absolute;
  inset: 0;
  background: var(--overlay);
  opacity: 0;
  transition: opacity 0.4s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pack-card:hover .card-overlay { opacity: 1; }

.view-label {
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text);
  border: 1px solid var(--text);
  padding: 10px 22px;
  transform: translateY(10px);
  transition: transform 0.4s cubic-bezier(0.2,0,0,1);
}
.pack-card:hover .view-label { transform: translateY(0); }

.pack-meta {
  padding: 18px 22px 22px;
  background: var(--bg);
  transition: background 0.55s;
}
.pack-meta-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5px;
}
.pack-name {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
  transition: color 0.55s;
}
.pack-cat {
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
}
.pack-desc-short {
  font-size: 0.76rem;
  color: var(--text-sub);
  line-height: 1.55;
  transition: color 0.55s;
}

/* ─── PACK DETAIL PAGE ─── */
#page-detail {
  display: none;
  min-height: 100vh;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.2,0,0,1);
}
#page-detail.visible { opacity: 1; transform: translateY(0); }

.detail-inner {
  max-width: 940px;
  margin: 0 auto;
  padding: 148px 52px 100px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-sub);
  cursor: none;
  border: none;
  background: none;
  margin-bottom: 56px;
  transition: color 0.25s, gap 0.35s;
}
.back-btn:hover { color: var(--text); gap: 20px; }

.back-arrow {
  width: 32px; height: 1px;
  background: currentColor;
  position: relative;
  flex-shrink: 0;
  transition: width 0.35s cubic-bezier(0.2,0,0,1);
}
.back-arrow::before {
  content: '';
  position: absolute;
  left: 0; top: -3px;
  width: 7px; height: 7px;
  border-left: 1px solid currentColor;
  border-bottom: 1px solid currentColor;
  transform: rotate(45deg);
}
.back-btn:hover .back-arrow { width: 48px; }

.detail-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.8rem);
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: 10px;
}
.detail-title em { font-style: italic; color: var(--accent); }

.detail-cat {
  font-size: 0.63rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-sub);
  margin-bottom: 48px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.detail-cat::after {
  content: '';
  width: 180px; height: 1px;
  background: var(--border);
  transition: background 0.55s;
}

/* Video */
.video-wrap {
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 3px;
  overflow: hidden;
  background: var(--surface);
  margin-bottom: 40px;
  transition: background 0.55s;
}
.video-wrap iframe { width:100%; height:100%; border:none; display:block; }

.video-placeholder-msg {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; color:var(--text-sub);
  font-size:0.72rem; letter-spacing:0.14em;
  text-transform:uppercase;
  transition: color 0.55s;
}
.video-placeholder-msg svg { width:36px; height:36px; opacity:0.25; }

.detail-desc {
  font-size: 0.88rem;
  line-height: 1.85;
  color: var(--text-sub);
  max-width: 540px;
  margin-bottom: 48px;
  transition: color 0.55s;
}

/* Download button */
.dl-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: var(--text);
  color: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 16px 38px;
  border-radius: 2px;
  cursor: none;
  transition: background 0.35s, color 0.35s, gap 0.35s, box-shadow 0.35s;
}
.dl-btn:hover {
  background: var(--accent);
  color: #fff;
  gap: 22px;
  box-shadow: 0 8px 36px rgba(200,169,110,0.28);
}
.dl-icon { width:14px; height:14px; flex-shrink:0; }

/* ─── PAGE TRANSITIONS ─── */
#page-home { transition: opacity 0.38s ease, transform 0.38s ease; }
#page-home.hidden { opacity:0; transform:translateY(-14px); pointer-events:none; }

/* ─── FOOTER ─── */
footer {
  border-top: 1px solid var(--border);
  padding: 30px 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color 0.55s;
}
footer p {
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-sub);
  transition: color 0.55s;
}

/* ─── KEYFRAMES ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  header { padding: 18px 24px; }
  .hero { padding: 110px 24px 52px; flex-direction:column; gap:20px; }
  .hero-right { text-align:left; max-width:100%; }
  .divider { margin: 40px 24px 32px; }
  .grid-label { padding: 0 24px; }
  .packs-grid { padding: 0 24px 80px; grid-template-columns: 1fr 1fr; gap: 1px; }
  .detail-inner { padding: 110px 24px 80px; }
  footer { padding: 24px; flex-direction:column; gap:8px; text-align:center; }
}
@media (max-width: 480px) {
  .packs-grid { grid-template-columns: 1fr; }
  .hero-left h1 { font-size: 2.4rem; }
}
</style>
</head>
<body>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- ════════ HEADER ════════ -->
<header>
  <a class="logo" href="#" onclick="goHome(); return false;">Pack<em>s</em></a>
  <div class="header-right">
    <span class="pack-count" id="packCountLabel"></span>
    <span class="theme-label" id="themeLabel">Clair</span>
    <div class="theme-toggle" id="themeToggle"></div>
  </div>
</header>

<!-- ════════════════════════════════
     PAGE ACCUEIL
════════════════════════════════ -->
<div id="page-home">
  <section class="hero">
    <div class="hero-left">
      <h1>Mes packs<br/><em>graphiques.</em></h1>
    </div>
    <div class="hero-right">
      <p>Clique sur un pack pour découvrir la vidéo de présentation et télécharger le fichier compressé.</p>
    </div>
  </section>

  <div class="divider"></div>

  <div class="grid-label">
    <span id="gridCount"></span>
    <span>↓ Explorer</span>
  </div>

  <div class="packs-grid" id="packsGrid"></div>

  <footer>
    <p>&copy; 2025 — Packs Graphiques</p>
    <p>Tous droits réservés</p>
  </footer>
</div>

<!-- ════════════════════════════════
     PAGE DETAIL
════════════════════════════════ -->
<div id="page-detail">
  <div class="detail-inner">
    <button class="back-btn" onclick="goHome()">
      <span class="back-arrow"></span>Retour
    </button>
    <h2 class="detail-title" id="detail-title"></h2>
    <div class="detail-cat" id="detail-cat"></div>
    <div class="video-wrap" id="detail-video"></div>
    <p class="detail-desc" id="detail-desc"></p>
    <a class="dl-btn" id="detail-dl" href="#" target="_blank">
      <svg class="dl-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/>
      </svg>
      Télécharger le pack (.rar)
    </a>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   📦  TES PACKS  —  modifie ce tableau !
   ══════════════════════════════════════════
   Chaque pack a ces champs :
     id       → identifiant unique (pas d'espaces)
     name     → nom affiché
     cat      → catégorie (affiché en petit)
     desc     → phrase courte pour la card
     fullDesc → texte complet sur la page du pack
     image    → chemin vers ton image de preview (ex: "images/pack1.jpg")
                ou URL externe. Laisse "" pour placeholder.
     video    → URL d'embed YouTube (ex: "https://www.youtube.com/embed/XXXXXXXXXXX")
                Laisse "" si pas encore de vidéo.
     dl       → lien direct de téléchargement vers ton .rar
   ══════════════════════════════════════════ */
const packs = [
  {
    id:       "pack-1",
    name:     "Pack Vitrine",
    cat:      "Présentation",
    desc:     "Templates pour vitrines et portfolios professionnels.",
    fullDesc: "Un pack complet de templates pour présenter ton travail de façon impeccable. Bannières, mockups et fichiers sources modifiables inclus.",
    image:    "",
    video:    "",
    dl:       "#"
  },
  {
    id:       "pack-2",
    name:     "Pack Social",
    cat:      "Réseaux Sociaux",
    desc:     "Stories, posts et thumbnails optimisés pour les réseaux.",
    fullDesc: "Formats prêts pour Instagram, TikTok et YouTube. Stories 9:16, carrés 1:1, thumbnails 16:9 — tout est pensé pour te démarquer.",
    image:    "",
    video:    "",
    dl:       "#"
  },
  {
    id:       "pack-3",
    name:     "Pack Motion",
    cat:      "Animation",
    desc:     "Intros, transitions et overlays animés pour tes vidéos.",
    fullDesc: "Pack d'animations clé-en-main : intros, outros, lower thirds, transitions. Fichiers After Effects et exports vidéo inclus.",
    image:    "",
    video:    "",
    dl:       "#"
  },
  {
    id:       "pack-4",
    name:     "Pack Typo",
    cat:      "Typographie",
    desc:     "Sélection de polices et paires typographiques soignées.",
    fullDesc: "Typographies libres de droits pour usage commercial, avec guide d'association et exemples d'application pratiques.",
    image:    "",
    video:    "",
    dl:       "#"
  },
  {
    id:       "pack-5",
    name:     "Pack Icônes",
    cat:      "UI / Éléments",
    desc:     "800+ icônes cohérentes en SVG et PNG haute qualité.",
    fullDesc: "Bibliothèque complète en styles outline, filled et duotone. SVG vectoriel + PNG 2x. Catégorisées et prêtes à l'emploi.",
    image:    "",
    video:    "",
    dl:       "#"
  },
  {
    id:       "pack-6",
    name:     "Pack Palettes",
    cat:      "Identité Visuelle",
    desc:     "50 palettes de couleurs professionnelles prêtes à l'emploi.",
    fullDesc: "Palettes construites selon les règles de l'harmonie chromatique. Fichiers Figma, Adobe Swatch et codes HEX/RGB/CMJN fournis.",
    image:    "",
    video:    "",
    dl:       "#"
  }
];

/* ────────────────────────────────────
   RENDU DES CARDS
──────────────────────────────────── */
const grid = document.getElementById('packsGrid');
document.getElementById('gridCount').textContent = `${packs.length} pack${packs.length > 1 ? 's' : ''} disponible${packs.length > 1 ? 's' : ''}`;
document.getElementById('packCountLabel').textContent = `${packs.length} Packs`;

packs.forEach(p => {
  const thumb = p.image
    ? `<img src="${p.image}" alt="${p.name}" loading="lazy"/>`
    : `<div class="thumb-placeholder">Aperçu à venir</div>`;

  const card = document.createElement('a');
  card.className = 'pack-card';
  card.href = '#';
  card.innerHTML = `
    <div class="pack-thumb">
      ${thumb}
      <div class="card-overlay">
        <span class="view-label">Voir le pack</span>
      </div>
    </div>
    <div class="pack-meta">
      <div class="pack-meta-top">
        <span class="pack-name">${p.name}</span>
        <span class="pack-cat">${p.cat}</span>
      </div>
      <p class="pack-desc-short">${p.desc}</p>
    </div>`;
  card.addEventListener('click', e => { e.preventDefault(); openPack(p); });
  grid.appendChild(card);
});

/* ────────────────────────────────────
   NAVIGATION
──────────────────────────────────── */
function openPack(p) {
  const home   = document.getElementById('page-home');
  const detail = document.getElementById('page-detail');

  // Titre avec italique sur le 2e mot
  const parts = p.name.split(' ');
  const titleHTML = parts.length > 1
    ? `${parts[0]} <em>${parts.slice(1).join(' ')}</em>`
    : `<em>${p.name}</em>`;
  document.getElementById('detail-title').innerHTML = titleHTML;
  document.getElementById('detail-cat').textContent  = p.cat;
  document.getElementById('detail-desc').textContent = p.fullDesc;
  document.getElementById('detail-dl').href = p.dl;

  const videoWrap = document.getElementById('detail-video');
  if (p.video) {
    videoWrap.innerHTML = `<iframe src="${p.video}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  } else {
    videoWrap.innerHTML = `
      <div class="video-placeholder-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
        </svg>
        <span>Vidéo à venir</span>
      </div>`;
  }

  home.classList.add('hidden');
  setTimeout(() => {
    home.style.display = 'none';
    detail.style.display = 'block';
    window.scrollTo(0, 0);
    requestAnimationFrame(() => requestAnimationFrame(() => detail.classList.add('visible')));
  }, 340);
}

function goHome() {
  const home   = document.getElementById('page-home');
  const detail = document.getElementById('page-detail');

  detail.classList.remove('visible');
  setTimeout(() => {
    detail.style.display = 'none';
    home.style.display   = '';
    home.classList.remove('hidden');
    window.scrollTo(0, 0);
  }, 420);
}

/* ────────────────────────────────────
   THEME TOGGLE
──────────────────────────────────── */
const themeToggle = document.getElementById('themeToggle');
const themeLabel  = document.getElementById('themeLabel');

themeToggle.addEventListener('click', () => {
  const html  = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  themeLabel.textContent = isDark ? 'Clair' : 'Sombre';
});

/* ────────────────────────────────────
   CUSTOM CURSOR
──────────────────────────────────── */
const cursor     = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

(function animateRing() {
  rx += (mx - rx) * 0.11;
  ry += (my - ry) * 0.11;
  cursorRing.style.left = rx + 'px';
  cursorRing.style.top  = ry + 'px';
  requestAnimationFrame(animateRing);
})();

document.querySelectorAll('a, button, .theme-toggle, .pack-card').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
});
</script>
</body>
</html>
